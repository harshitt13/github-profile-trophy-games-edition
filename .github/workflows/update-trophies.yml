name: Generate GitHub Trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Start Local Server in Background
        run: deno task start &
        env:
          # Mapping the secret to the specific names the fork expects
          GITHUB_TOKEN1: ${{ secrets.TROPHY_TOKEN }}
          GITHUB_TOKEN2: ${{ secrets.TROPHY_TOKEN }}
          PROFILE_USERNAME: harshitt13 

      - name: Wait for server to boot
        run: sleep 10

      - name: Generate Trophy Image
        run: deno run --allow-net --allow-env --allow-read --allow-write ./render_svg.ts "harshitt13" "./trophy.svg" "default" "http://localhost:8080"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update github profile trophies"
          file_pattern: "*.svg"