name: "GitHub Profile Trophy - Games Edition"
description: "Generate game rank badges for your GitHub profile using your self-hosted Vercel API to bypass rate limits."
author: "harshitt13"

branding:
  icon: "award"
  color: "purple"

inputs:
  username:
    description: "GitHub username to generate the trophy for"
    required: true
  api_url:
    description: "Your self-hosted Vercel URL (e.g., https://your-app.vercel.app)"
    required: true
  output_path:
    description: "Output path to write the SVG"
    required: true
    default: "trophy.svg"
  token:
    description: "PAT or token to use for GitHub API"
    required: true
  theme:
    description: "Theme for the card (e.g., lol)"
    required: false
    default: "default"

runs:
  using: "composite"
  steps:
    - name: Setup Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v1.x

    - name: Generate trophy
      shell: bash
      env:
        GITHUB_TOKEN1: ${{ inputs.token }}
      run: |
        deno run --allow-net --allow-env --allow-read --allow-write ${{ github.action_path }}/render_svg.ts "${{ inputs.username }}" "${{ inputs.output_path }}" "${{ inputs.theme }}" "${{ inputs.api_url }}"
